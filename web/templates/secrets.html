{{template "layout.html" .}}
{{define "title"}}Secrets — agenthub{{end}}
{{define "content"}}
<h1>Manage Secrets</h1>
<p>Values are stored encrypted. Leave a field blank to keep the existing value.</p>
{{if .Error}}<p class="error">{{.Error}}</p>{{end}}
{{if .Success}}<p class="success">{{.Success}}</p>{{end}}
<div class="card">
<form method="POST" action="/admin/secrets">
    <label>OpenAI API Key</label>
    <input type="password" name="openai_api_key" placeholder="sk-... (leave blank to keep)">
    <label>Slack Bot Token</label>
    <input type="password" name="slack_bot_token" placeholder="xoxb-... (leave blank to keep)">
    <label>Slack App Token</label>
    <input type="password" name="slack_app_token" placeholder="xapp-... (leave blank to keep)">
    <button type="submit">Save Secrets</button>
</form>
</div>
{{end}}
