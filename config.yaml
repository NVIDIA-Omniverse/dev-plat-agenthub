# agenthub configuration
# All tunable settings live here. No behavior is hard-coded.
# Secrets (API keys, tokens, passwords) are NOT stored here —
# they live in the encrypted store at store.path.

server:
  # HTTP listen address for the admin web UI and API
  http_addr: ":8080"
  # Public base URL of this agenthub instance (sent to bots during onboarding so
  # they know where to POST tasks and status updates back).
  # Example: "https://agenthub.example.com"  Leave empty to skip onboarding directives.
  public_url: ""
  # Read and write timeouts for HTTP connections
  read_timeout: 30s
  write_timeout: 30s
  # Session cookie name
  session_cookie_name: "agenthub_session"

store:
  # Path to the encrypted secrets store file.
  # This file contains API keys, tokens, and the admin password hash.
  # It is encrypted with AES-256-GCM using a key derived from the admin password.
  path: "~/.agenthub/secrets.enc"

slack:
  # Use Socket Mode (recommended). Requires an App-Level Token (xapp-).
  socket_mode: true
  # How often to log Slack heartbeat status
  heartbeat_interval: 60s
  # Slash command prefix used in this workspace
  command_prefix: "/agenthub"

openclaw:
  # Timeout for individual liveness HTTP requests
  liveness_timeout: 10s
  # How often to check all registered openclaw instances
  liveness_interval: 60s
  # Expected health endpoint path on each openclaw instance
  health_path: "/health"
  # Directive endpoint path on each openclaw instance
  directives_path: "/directives"

openai:
  # Model to use for agenthub's own intelligence
  # Recommended: gpt-4o-mini (fast, cost-effective for routing decisions)
  model: "gpt-4o-mini"
  # Maximum tokens per response
  max_tokens: 1024
  # System prompt for agenthub's OpenAI assistant.
  # BOTJILE: every DM that contains a task is automatically tracked on the kanban board.
  system_prompt: >
    You are agenthub, a Slack-native work distribution hub for a fleet of AI bots (openclaw instances).
    Your operating model is BOTJILE — Full Agile for bots.

    Core principles:
    - Every piece of work lives on the kanban board. No dark work. No shadow tasks.
    - The kanban board shows both projects (things many bots collaborate on) and individual
      bot activity: what each bot is doing right now, what it has finished, what is in its backlog.
    - When a user DMs you with something to do, a bead (task) is automatically created and routed
      to the best available bot. You always acknowledge the task ID in your reply.
    - Bots report their own status back via the agenthub API as they work, so the board stays live.

    When responding to users:
    - Reference task IDs (e.g. AH-42) when they exist.
    - Be concise and direct — Slack messages, not essays.
    - For bot status queries, summarise what each bot is working on and what is queued.
    - For work requests, confirm what was created and who is working on it.
    - Respond in plain text suitable for Slack (no markdown headers).

beads:
  # Path to the Beads/Dolt database directory.
  # On the Azure VM, WorkingDirectory=/home/jordanh so ".beads/dolt" resolves to
  # /home/jordanh/.beads/dolt — served by beads-dolt.service on 127.0.0.1:42251.
  # Server-mode settings live in ~/.beads/metadata.json (not committed — machine-specific).
  db_path: ".beads/dolt"

dolt:
  # DSN for the Dolt SQL server (MySQL-compatible)
  # Run: dolt sql-server in your Dolt database directory
  dsn: "root:@tcp(127.0.0.1:3306)/agenthub"
  # Maximum number of open database connections
  max_open_conns: 10
  # Maximum number of idle connections
  max_idle_conns: 5
  # Connection max lifetime
  conn_max_lifetime: 5m

log:
  # Log level: debug, info, warn, error
  level: "info"
  # Log format: json, text
  format: "json"

kanban:
  # Column names must be valid Beads status values:
  # open, in_progress, blocked, deferred, closed
  columns:
    - "open"
    - "in_progress"
    - "blocked"
    - "deferred"
    - "closed"
